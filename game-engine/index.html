<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>OK Code Camp — The Skeleton</title>
    <meta
      name="description"
      content="A kid-skinnable side-scrolling platformer. Draw it on paper; play it for real."
    />

    <!-- Space Grotesk for UI chrome. Never Fraunces (hard rule). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --machine: #17181b; /* the gray world */
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--machine);
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        /* respect notches on phones */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #game-root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Phaser's FIT canvas */
      #game-root canvas {
        touch-action: none;
        display: block;
        max-width: 100%;
        max-height: 100%;
      }

      /* "Rotate to landscape" hint — only on touch devices held in portrait.
         The 16:9 game letterboxes small in portrait; landscape fills the screen. */
      #rotate-hint {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-hint {
          display: flex;
          position: fixed;
          inset: 0;
          z-index: 50;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          padding: 28px;
          text-align: center;
          background: var(--machine);
          color: #c9ccd2;
        }
      }
      #rotate-hint svg {
        width: 88px;
        height: 88px;
      }
      #rotate-hint .phone {
        transform-origin: 50% 50%;
        animation: rh-rotate 2.6s ease-in-out infinite;
      }
      #rotate-hint p {
        margin: 0;
        font-size: 18px;
        font-weight: 500;
      }
      #rotate-hint .eyebrow {
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        font-size: 12px;
        letter-spacing: 0.14em;
        color: #0fa3a3;
        text-transform: uppercase;
      }
      @keyframes rh-rotate {
        0%,
        38% {
          transform: rotate(0deg);
        }
        58%,
        100% {
          transform: rotate(-90deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #rotate-hint .phone {
          animation: none;
          transform: rotate(-90deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="rotate-hint" aria-hidden="true">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
        <g class="phone">
          <rect x="39" y="22" width="22" height="40" rx="5" stroke="#c9ccd2" stroke-width="3" />
          <line x1="46" y1="56" x2="54" y2="56" stroke="#8b8f98" stroke-width="3" stroke-linecap="round" />
        </g>
        <path d="M22 80 a30 30 0 0 0 56 0" stroke="#0fa3a3" stroke-width="2.5" stroke-linecap="round" />
        <path d="M78 80 l-2 -8 M78 80 l-8 -1" stroke="#0fa3a3" stroke-width="2.5" stroke-linecap="round" />
      </svg>
      <p>Turn your device sideways to play</p>
      <p class="eyebrow">OK Code Camp</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
